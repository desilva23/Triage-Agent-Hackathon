services:
  - type: web
    name: triage-agent-backend
    plan: free
    env: python
    buildCommand: pip install -r code/requirements.txt
    startCommand: cd code && uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHONUNBUFFERED
        value: "true"
